name: Giri Code Scanning

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC.
    - cron: "0 8 * * 1"

jobs:
  giri-scan:
    name: Giri SARIF Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build giri
        run: go build -o giri ./cmd/giri

      - name: Run giri (SARIF output)
        run: ./giri -format sarif ./... > giri-results.sarif 2>/dev/null || true
        # Exit code 1 means violations found; continue so we upload the report.

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: giri-results.sarif
          category: giri
